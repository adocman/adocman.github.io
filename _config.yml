title: El Archivo de Notas
description: "Un espacio para mis notas sobre tecnología, idiomas y más."
baseurl: "/" # Cambia esto según tu repo en GitHub Pages
url: "http://127.0.0.1:4000" # O tu dominio personalizado

# Redes sociales
threads_username: adocman
github_username: adocman

sass:
  sass_dir: _sass
  style: compressed

# Construcción y Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Configuración para posts
highlighter: rouge # Permite resaltar código en Markdown
markdown: kramdown
kramdown:
  math_engine: mathjax # Soporte para fórmulas matemáticas en Markdown
  syntax_highlighter: rouge # Destacado de sintaxis en código

permalink: /blog/:title/

collections:
  categorias:
    output: true
    permalink: /categorias/:path/


# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
