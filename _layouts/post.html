---
layout: default
---
<article class="post" data-aos="fade-up">

  <!-- Título -->
  <h1>{{ page.title }}</h1>

  <!-- Metadatos -->
  <p class="text-sm mb-4 text-slate-400">
    {{ page.date | date: "%B %d, %Y" }} ·
    {% for cat in page.categories %}
      <a href="/categorias/{{ cat | slugify }}/" class="text-blue-600 hover:underline">{{ cat }}</a>{% unless forloop.last %}, {% endunless %}
    {% endfor %}
     · {{ page.reading_time }}
  </p>

  <!-- Extracto -->
  {% if page.excerpt %}
    <blockquote data-aos="fade-in">{{ page.excerpt }}</blockquote>
  {% endif %}

  <!-- Contenido principal -->
  {{ content }}

</article>
