---
layout: default
---
<section class="max-w-3xl mx-auto py-8" data-aos="fade-up">
  <h1 class="text-4xl font-bold mb-6 text-slate-50">{{ page.title }}</h1>
  <ul class="space-y-4">
    {% assign posts = site.categories[page.category] %}
    {% for post in posts %}
      <li data-aos="fade-in" data-aos-delay="100">
        <a href="{{ post.url }}" class="text-blue-600 hover:underline">{{ post.title }}</a>
        <p class="text-slate-400 text-sm">
          {{ post.date | date: "%B %d, %Y" }} · {{ post.reading_time }}
        </p>
      </li>
    {% endfor %}
  </ul>
</section>
