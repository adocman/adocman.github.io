---
layout: default
---

<!-- BLOG SECTION -->
<section id="blog" class="section fade-in" style="background-color: var(--bg-main); color: var(--text-color);">
  <div class="container px-5 md:px-10 lg:px-12 xl:px-16">
    <div class="mx-auto grid max-w-none grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 border-t" style="border-color: rgba(255,255,255,0.1);">
      {% assign posts = site.categories[page.category] %}
      {% for post in posts %}
      <article class="flex flex-col items-start sound-hover" onpointerenter="window.soundHover.play()">
        <div class="flex items-center gap-x-4 text-xs opacity-75">
          <time datetime="{{ post.date | date: '%Y-%m-%d' }}">{{ post.date | date: '%b %d, %Y' }}</time>
          <span class="rounded-full bg-[var(--bg-sidebar)] px-3 py-1 font-medium" style="color: var(--text-color);">{{ post.categories[0] }}</span>
        </div>
        <h3 class="mt-3 text-3xl font-semibold hover:underline">
          <a href="{{ post.url }}" class="sound-click" target="_blank" onclick="window.soundOpen.play()">{{ post.title }}</a>
        </h3>
        <p class="mt-4 text-sm opacity-80 sound-hover" onpointerenter="window.soundHover.play()">{{ post.excerpt }}</p>
      </article>
      {% endfor %}
    </div>
  </div>
</section>
