---
layout: default
title: Categorías
permalink: /categorias/
---

<h1 class="text-3xl font-bold mb-4">Categorías</h1>

<ul class="space-y-2">
  {% for category in site.categories %}
    <li>
      <a href="{{ site.baseurl }}/categorias/{{ category[0] | slugify }}/" class="text-blue-600 hover:underline">
        {{ category[0] }} ({{ category[1] | size }})
      </a>
    </li>
  {% endfor %}
</ul>
